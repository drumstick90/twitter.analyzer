{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card">
            <div class="card-header">
                <h3>Run Analysis</h3>
            </div>
            <div class="card-body">
                <form action="/analyze" method="post">
                    <div class="mb-3">
                        <label for="dataset" class="form-label">Select Dataset</label>
                        <select class="form-select" id="dataset" name="dataset" required>
                            {% for ds in datasets %}
                                <option value="{{ ds }}">{{ ds }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">Datasets are folders containing scraped JSON tweets.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="analysis_type" class="form-label">Analysis Type</label>
                        <select class="form-select" id="analysis_type" name="analysis_type" required>
                            <option value="growth">Growth Escalation (Monthly/Quarterly Trends)</option>
                            <option value="heatmap">Hourly Heatmap (Activity Patterns)</option>
                            <option value="likes">Likes Analysis (Daily Progression)</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Analyze</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="ib-page-head"><h1>Analyze</h1></div>

        <div class="card">
            <div class="card-body">
                <form action="/analyze" method="post">
                    <div class="mb-3">
                        <label for="dataset" class="form-label">Dataset</label>
                        <select class="form-select" id="dataset" name="dataset" required>
                            {% for ds in datasets %}
                            <option value="{{ ds }}">{{ ds }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="analysis_type" class="form-label">Type</label>
                        <select class="form-select" id="analysis_type" name="analysis_type" required>
                            <option value="growth">Growth (monthly / quarterly)</option>
                            <option value="heatmap">Hourly heatmap</option>
                            <option value="likes">Likes progression</option>
                        </select>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Run</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Twitter Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/ib-theme.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="ib-app">
    {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-light ib-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">Twitter Analyzer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-lg-1">
                    <li class="nav-item"><a class="nav-link" href="/scrape">Scrape</a></li>
                    <li class="nav-item"><a class="nav-link" href="/scrape-24h">24h</a></li>
                    <li class="nav-item"><a class="nav-link" href="/browse">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ping">Ping</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analyze">Analyze</a></li>
                    <li class="nav-item"><a class="nav-link ib-logout" href="/logout">Sign out</a></li>
                </ul>
            </div>
        </div>
    </nav>
    {% endblock %}

    <main class="{% block main_classes %}container-fluid px-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="ib-footer text-center">
        <span>© 2026</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

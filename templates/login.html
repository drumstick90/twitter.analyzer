{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block main_classes %}px-0{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="ib-login-wrap">
    <div class="ib-login-box">
        <h1>Twitter Analyzer</h1>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post">
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required autofocus autocomplete="current-password">
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">Sign in</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

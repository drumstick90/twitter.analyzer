{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="ib-page-head">
            <h1>Ping</h1>
            <p>Check which years a user was active.</p>
        </div>

        <div class="card ib-accent-warn">
            <div class="card-body">
                <form action="/ping" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="without @" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label for="start_year" class="form-label">From</label>
                            <input type="number" class="form-control" id="start_year" name="start_year" value="2006" required>
                        </div>
                        <div class="col">
                            <label for="end_year" class="form-label">To</label>
                            <input type="number" class="form-control" id="end_year" name="end_year" value="2026" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Start</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h1 class="mb-0" style="font-size:1.25rem">{{ analysis_type|title }} · {{ dataset }}</h1>
    <a href="/analyze" class="btn btn-outline-secondary btn-sm">New analysis</a>
</div>

<div class="card">
    <div class="card-body text-center">
        {% if error_message %}
        <div class="alert alert-danger">{{ error_message }}</div>
        {% elif plot_image %}
        <img src="data:image/png;base64,{{ plot_image }}" class="img-fluid" alt="Plot">
        {% else %}
        <div class="alert alert-warning">No visualization generated.</div>
        {% endif %}
    </div>
</div>
{% endblock %}

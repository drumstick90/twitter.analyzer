{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="ib-page-head"><h1>New scrape</h1></div>

        <div class="card">
            <div class="card-body">
                <form action="/scrape" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="without @" required>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" name="year" placeholder="e.g. 2024">
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label for="start_date" class="form-label">Start date</label>
                            <input type="date" class="form-control" id="start_date" name="start_date">
                        </div>
                        <div class="col">
                            <label for="end_date" class="form-label">End date</label>
                            <input type="date" class="form-control" id="end_date" name="end_date">
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="monthly_chunks" id="monthly_chunks" value="on">
                        <label class="form-check-label" for="monthly_chunks">
                            Split into monthly queries
                        </label>
                        <div class="form-text">Completed months stay on disk if the run fails.</div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Start scrape</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

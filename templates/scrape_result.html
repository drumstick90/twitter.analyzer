{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="ib-page-head"><h1>Scrape result</h1></div>

        <div class="card">
            <div class="card-body">
                {% if success %}
                <div class="alert alert-success mb-3">
                    <p class="mb-1">{{ message }}</p>
                    <p class="mb-0 small">Saved to <code>{{ project_dir }}</code></p>
                </div>
                {% else %}
                <div class="alert alert-danger mb-3">{{ message }}</div>
                {% endif %}

                <div class="d-flex gap-2">
                    <a href="/analyze" class="btn btn-primary btn-sm">Analyze</a>
                    <a href="/scrape" class="btn btn-secondary btn-sm">New scrape</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
